name: Continuous Integration 
on:
  - push

jobs:
  Discord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Discord Commits
        uses: Sniddl/discord-commits@v1.8
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          template: "avatar-with-link"
          include-extras: true